<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trazabilidad Producción</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 24px; margin-bottom: 30px; color: #333; display: flex; align-items: center; gap: 10px; }
    .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 30px; }
    .tab { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 16px; color: #666; }
    .tab.active { color: #333; border-bottom: 3px solid #333; margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
    label .required { color: red; }
    input[type="text"], input[type="date"], input[type="number"], select, textarea { 
      width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #333; box-shadow: 0 0 0 3px rgba(0,0,0,0.1); }
    
    .section-title { font-size: 16px; font-weight: 600; margin-top: 25px; margin-bottom: 15px; color: #333; text-transform: uppercase; }
    
    .talles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-top: 10px; }
    .talle-item { display: flex; flex-direction: column; gap: 5px; }
    .talle-item label { margin: 0; font-size: 12px; font-weight: 500; }
    .talle-item input { padding: 8px; }
    
    .button-group { display: flex; gap: 10px; margin-top: 30px; }
    button { padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: 600; }
    .btn-primary { background: #333; color: white; }
    .btn-primary:hover { background: #555; }
    .btn-secondary { background: #ddd; color: #333; }
    .btn-secondary:hover { background: #bbb; }
    
    .message { padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; }
    .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
    .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    .message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; display: block; }
    
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Trazabilidad Producción</h1>
    
    <div id="message"></div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('ingreso')">Ingreso</button>
      <button class="tab" onclick="switchTab('salida')">Salida</button>
    </div>
    
    <!-- INGRESO -->
    <div id="ingreso" class="tab-content active">
      <div class="section-title">Orden</div>
      
      <div class="form-group">
        <label>Artículo <span class="required">*</span></label>
        <select id="articulo" onchange="cargarColores()">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Color <span class="required">*</span></label>
        <select id="color">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>N° OP Madre <span class="required">*</span></label>
        <input type="text" id="opMadre" placeholder="OP-0001">
      </div>
      
      <div class="form-group">
        <label>Código (auto)</label>
        <input type="text" id="codigoAuto" readonly>
      </div>
      
      <div class="section-title">Detalles</div>
      
      <div class="form-group">
        <label>Etapa <span class="required">*</span></label>
        <select id="etapa">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Taller <span class="required">*</span></label>
        <select id="taller">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Fecha Ingreso <span class="required">*</span></label>
        <input type="date" id="fechaIngreso">
      </div>
      
      <div class="form-group">
        <label>Unidades Ingresadas <span class="required">*</span></label>
        <input type="number" id="unidIngreso" placeholder="500" min="1">
      </div>
      
      <div class="form-group">
        <label>Responsable <span class="required">*</span></label>
        <select id="responsable">
          <option value="">-- Seleccionar --</option>
        </select>
      </div>
      
      <div class="section-title">Curva de Talles</div>
      <div id="talles-container" class="talles-grid"></div>
      
      <div class="form-group">
        <label>Observaciones</label>
        <textarea id="observaciones" placeholder="Notas adicionales..." rows="3"></textarea>
      </div>
      
      <div class="button-group">
        <button class="btn-primary" onclick="guardarMovimiento()">Guardar Movimiento</button>
        <button class="btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
      </div>
    </div>
    
    <!-- SALIDA -->
    <div id="salida" class="tab-content">
      <p class="loading">Módulo de salida en desarrollo...</p>
    </div>
  </div>
  
  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-4AtOnMo-ymxPH9kixVscHW1gOAA2fJWlsdKDTVVgL1r8M6dutZV681xeo41YfjE/exec";
    let data = {};
    
    function callAppsScript(payload) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", APPS_SCRIPT_URL, true);
        xhr.onload = function() {
          try {
            const response = JSON.parse(xhr.responseText);
            resolve(response);
          } catch (e) {
            reject(new Error("Error parsing response: " + xhr.responseText));
          }
        };
        xhr.onerror = function() {
          reject(new Error("Network error"));
        };
        xhr.send(JSON.stringify(payload));
      });
    }
    
    async function cargarDatos() {
      try {
        const json = await callAppsScript({ action: "loadAllData" });
        data = json;
        console.log("✓ Datos cargados:", data);
        
        poblarSelect("articulo", data.articulos || []);
        poblarSelect("etapa", data.etapas || []);
        poblarSelect("taller", data.talleres || []);
        poblarSelect("responsable", data.responsables || []);
        crearInputsTalles(data.talles || []);
        
        document.getElementById("fechaIngreso").valueAsDate = new Date();
      } catch (error) {
        console.error("Error cargando datos:", error);
        mostrarMensaje("Error al cargar datos: " + error.message, "error");
      }
    }
    
    function poblarSelect(id, opciones) {
      const select = document.getElementById(id);
      opciones.forEach(op => {
        const option = document.createElement("option");
        option.value = op;
        option.textContent = op;
        select.appendChild(option);
      });
    }
    
    function crearInputsTalles(talles) {
      const container = document.getElementById("talles-container");
      container.innerHTML = "";
      talles.forEach(talle => {
        const div = document.createElement("div");
        div.className = "talle-item";
        div.innerHTML = `
          <label>${talle}</label>
          <input type="number" class="talle-input" data-talle="${talle}" placeholder="0" min="0">
        `;
        container.appendChild(div);
      });
    }
    
    async function cargarColores() {
      const articulo = document.getElementById("articulo").value;
      const colorSelect = document.getElementById("color");
      colorSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
      
      if (!articulo) return;
      
      try {
        const json = await callAppsScript({ action: "getColoresPorArticulo", articulo: articulo });
        console.log("✓ Colores para " + articulo + ":", json);
        
        if (json.colores && json.colores.length > 0) {
          json.colores.forEach(col => {
            const option = document.createElement("option");
            option.value = col;
            option.textContent = col;
            colorSelect.appendChild(option);
          });
        } else {
          const option = document.createElement("option");
          option.textContent = "[SIN COLORES]";
          option.disabled = true;
          colorSelect.appendChild(option);
        }
      } catch (error) {
        console.error("Error cargando colores:", error);
        mostrarMensaje("Error al cargar colores: " + error.message, "error");
      }
    }
    
    function generarCodigo() {
      const articulo = document.getElementById("articulo").value;
      const color = document.getElementById("color").value;
      const opMadre = document.getElementById("opMadre").value;
      
      if (articulo && color && opMadre) {
        const palabraPrincipal = color.split(" - ")[0].substring(0, 3).toUpperCase();
        const codigo = `OP-${opMadre.split("-")[1]}-${palabraPrincipal}`;
        document.getElementById("codigoAuto").value = codigo;
      }
    }
    
    document.addEventListener("change", function(e) {
      if (e.target.id === "opMadre" || e.target.id === "color") {
        generarCodigo();
      }
    });
    
    async function guardarMovimiento() {
      const articulo = document.getElementById("articulo").value;
      const color = document.getElementById("color").value;
      const opMadre = document.getElementById("opMadre").value;
      const codigoLinea = document.getElementById("codigoAuto").value;
      const etapa = document.getElementById("etapa").value;
      const taller = document.getElementById("taller").value;
      const fechaIngreso = document.getElementById("fechaIngreso").value;
      const unidIngreso = document.getElementById("unidIngreso").value;
      const responsable = document.getElementById("responsable").value;
      const observaciones = document.getElementById("observaciones").value;
      
      if (!articulo || !color || !opMadre || !etapa || !taller || !fechaIngreso || !unidIngreso || !responsable) {
        mostrarMensaje("Por favor completa todos los campos requeridos", "error");
        return;
      }
      
      try {
        const json = await callAppsScript({
          action: "registrarMovimiento",
          formData: {
            articulo, color, opMadre, codigoLinea, etapa, taller,
            fechaIngreso, unidIngreso, responsable, observaciones
          }
        });
        
        if (json.success) {
          mostrarMensaje("✓ Movimiento guardado exitosamente", "success");
          limpiarFormulario();
        } else {
          mostrarMensaje("Error: " + (json.error || "Desconocido"), "error");
        }
      } catch (error) {
        mostrarMensaje("Error al guardar: " + error.message, "error");
      }
    }
    
    function limpiarFormulario() {
      document.getElementById("articulo").value = "";
      document.getElementById("color").innerHTML = '<option value="">-- Seleccionar --</option>';
      document.getElementById("opMadre").value = "";
      document.getElementById("codigoAuto").value = "";
      document.getElementById("etapa").value = "";
      document.getElementById("taller").value = "";
      document.getElementById("fechaIngreso").valueAsDate = new Date();
      document.getElementById("unidIngreso").value = "";
      document.getElementById("responsable").value = "";
      document.getElementById("observaciones").value = "";
      document.getElementById("message").innerHTML = "";
    }
    
    function mostrarMensaje(texto, tipo) {
      const messageDiv = document.getElementById("message");
      messageDiv.className = `message ${tipo}`;
      messageDiv.textContent = texto;
      if (tipo !== "success") return;
      setTimeout(() => { messageDiv.innerHTML = ""; }, 5000);
    }
    
    function switchTab(tabName) {
      document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
      document.getElementById(tabName).classList.add("active");
      event.target.classList.add("active");
    }
    
    cargarDatos();
  </script>
</body>
</html>
